[pytest]
; ENABLE_SEMANTIC_SEARCH=false: test_api.py dijalankan default tanpa model
; embedding (lihat catatan di test_api.py) supaya test suite tidak butuh
; koneksi internet/GPU dan tetap cepat dijalankan berulang saat development.
env =
    ENABLE_SEMANTIC_SEARCH=false
    DATA_DIR=../data
 
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
